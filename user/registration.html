<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Register</title>
</head>

<body class="h-screen overflow-hidden">

  <div class="flex h-full">

    <!-- LEFT SIDE (Hero like news site) -->
    <div class="w-1/2 relative bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white flex items-center justify-center p-12">

      <!-- background overlay image style -->
      <div class="absolute inset-0 opacity-20 bg-cover bg-center"
           style="background-image: url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');">
      </div>

      <div class="relative z-10 max-w-xl">
        <h1 class="text-5xl font-bold leading-tight">
          Join <span class="text-orange-400">F-145</span>
        </h1>

        <p class="mt-6 text-gray-300 text-lg">
          Stay updated with the latest news, insights, and stories from around the world.
          Create your account and become part of the community.
        </p>

        <div class="mt-10 flex gap-10 text-sm text-gray-300">
          <div>
            <p class="text-2xl font-bold text-white">2.4M+</p>
            <p>Readers</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-white">24/7</p>
            <p>Updates</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-white">5</p>
            <p>Categories</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE (Form like login card) -->
    <div class="w-1/2 flex items-center justify-center bg-gray-100">

      <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">

        <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
        <p class="text-gray-500 mt-2">Sign up to get started</p>

        <form class="mt-8 space-y-5">

          <div>
            <label class="text-sm text-gray-600">Full Name</label>
            <input type="text"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
              placeholder="John Doe"/>
          </div>

          <div>
            <label class="text-sm text-gray-600">Email</label>
            <input type="email"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
              placeholder="example@mail.com"/>
          </div>

          <div>
            <label class="text-sm text-gray-600">Password</label>
            <input type="password"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
              placeholder="••••••••"/>
          </div>

          <div>
            <label class="text-sm text-gray-600">Confirm Password</label>
            <input type="password"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
              placeholder="••••••••"/>
          </div>

          <button
            class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
            Register
          </button>

        </form>

        <p class="text-sm text-center text-gray-500 mt-6">
          Already have an account?
          <a href="#" class="text-orange-500 font-medium">Sign in</a>
        </p>

      </div>

    </div>

  </div>

</body>
</html>
