<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="./output.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
    <div class="min-h-screen flex">

        <!-- Left Side (Brand / Design) -->
        <div
            class="hidden md:flex w-1/2 bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white items-center justify-center p-10">
            <div>
                <h1 class="text-4xl font-bold mb-4">Admin Panel</h1>
                <p class="text-gray-300">
                    Secure access to your dashboard. Manage users, settings, and analytics in one place.
                </p>
            </div>
        </div>

        <!-- Right Side (Form) -->
        <div class="w-full md:w-1/2 flex items-center justify-center bg-gray-100 p-6">

            <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">

                <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">
                    Welcome!
                </h2>
                <p class="text-center text-gray-500 mb-6">
                    Sign in to your admin account
                </p>

                <form id="loginForm" action="#" method="POST" class="space-y-5">

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Email
                        </label>
                        <input type="email" name="email" placeholder="admin@example.com"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-800"
                            required />
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Password
                        </label>
                        <input type="password" name="password" placeholder="••••••••"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-800"
                            required />
                    </div>
                    <!-- Button -->
                    <button id="loginBtn" type="submit"
                        class="w-full bg-gray-900 hover:bg-gray-800 text-white py-2 rounded-lg transition">
                        Sign in
                    </button>

                </form>

            </div>
            <div id="forToast">
            </div>

        </div>

    </div>

    <script src="service.js"></script>
    <script src="auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</body>

</html>
